openapi: "3.0.0"
info:
  title: Gaming City API
  description: |
    Comprehensive API documentation for Gaming City.
    Includes User Management, Games tracking, Friendships, and Secure Messaging.
  version: 1.2.0

servers:
  - url: http://localhost:7000/api
    description: Local development server

tags:
  - name: Auth
    description: User registration and authentication
  - name: User Profile
    description: Operations about user profiles and lists
  - name: Friends
    description: Management of social connections and suggestions
  - name: Games
    description: Game tracking and fetching operations
  - name: Chat
    description: Secure real-time messaging
  - name: Admin
    description: Administrator only operations

paths:
  # --- AUTH ROUTES ---
  /users/register:
    post:
      tags: [Auth]
      operationId: registerUser
      summary: Register a new user
      security: [] # Public operation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /users/login:
    post:
      tags: [Auth]
      operationId: loginUser
      summary: User login
      security: [] # Public operation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/verify:
    post:
      tags: [Auth]
      operationId: verifyUser
      summary: Verify user account with 6-digit code
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email:
                  { type: string, format: email, example: "user@example.com" }
                code:
                  {
                    type: string,
                    example: "123456",
                    description: "6-digit verification code sent to email",
                  }
      responses:
        "200":
          description: Account activated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"

  /users/forgot-password:
    post:
      tags: [Auth]
      operationId: forgotPassword
      summary: Request password reset code
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  { type: string, format: email, example: "user@example.com" }
      responses:
        "200":
          description: Reset code sent to email successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionSuccess"
        "404":
          description: Email not found
          $ref: "#/components/responses/NotFound"

  /users/reset-password:
    post:
      tags: [Auth]
      operationId: resetPassword
      summary: Reset password using verification code
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code, newPassword]
              properties:
                email:
                  { type: string, format: email, example: "user@example.com" }
                code: { type: string, example: "123456" }
                newPassword:
                  {
                    type: string,
                    format: password,
                    example: "new_secure_password",
                  }
      responses:
        "200":
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"

  /users/change-password:
    post:
      tags: [User Profile]
      operationId: changePassword
      summary: Change password while logged in
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [oldPassword, newPassword]
              properties:
                oldPassword: { type: string, format: password }
                newPassword: { type: string, format: password }
      responses:
        "200":
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionSuccess"
        "400":
          description: Incorrect old password
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # --- USER ROUTES ---
  /users:
    get:
      tags: [Admin]
      operationId: getAllUsers
      summary: Get all users (Admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /users/{id}:
    get:
      tags: [User Profile]
      operationId: getUserById
      summary: Get user by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: MongoDB User ID
          schema:
            type: string
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [User Profile]
      operationId: updateMyProfile
      summary: Update my profile
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: MongoDB User ID
          schema:
            type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Profile updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      tags: [User Profile]
      operationId: deleteMyAccount
      summary: Delete my account
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: MongoDB User ID
          schema:
            type: string
      responses:
        "200":
          description: Account deleted
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/role/{id}:
    put:
      tags: [Admin]
      operationId: updateRoles
      summary: Update user roles (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: MongoDB User ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: array
                  items:
                    type: string
                    enum: [owner, admin, user, writer]
      responses:
        "200":
          description: Roles updated
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /users/me/profile:
    get:
      tags: [User Profile]
      operationId: getMyProfile
      summary: Get my profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Personal profile details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/play-now/add:
    post:
      tags: [User Profile]
      operationId: addGameToPlayNow
      summary: Add game to Play Now list
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [gameId]
              properties:
                gameId:
                  type: string
                  description: MongoDB Game ID
      responses:
        "200":
          description: Game added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/play-now/remove:
    post:
      tags: [User Profile]
      operationId: removeGameFromPlayNow
      summary: Remove game from Play Now list
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [gameId]
              properties:
                gameId:
                  type: string
                  description: MongoDB Game ID
      responses:
        "200":
          description: Game removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # --- FRIENDS ROUTES ---
  /friends/request:
    post:
      tags: [Friends]
      operationId: sendFriendRequest
      summary: Send a friend request
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [recipientId]
              properties:
                recipientId:
                  type: string
      responses:
        "200":
          description: Request sent
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /friends/accept:
    post:
      tags: [Friends]
      operationId: acceptFriendRequest
      summary: Accept a friend request
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [senderId]
              properties:
                senderId:
                  type: string
      responses:
        "200":
          description: Friend request accepted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /friends/remove/{targetId}:
    delete:
      tags: [Friends]
      operationId: removeOrRejectFriend
      summary: Remove a friend or reject a request
      security:
        - bearerAuth: []
      parameters:
        - name: targetId
          in: path
          required: true
          description: MongoDB User ID to remove/reject
          schema:
            type: string
      responses:
        "200":
          description: Action successful
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /friends/list:
    get:
      tags: [Friends]
      operationId: getFriends
      summary: Get my friends list
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of friends
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /friends/requests/pending:
    get:
      tags: [Friends]
      operationId: getPendingRequests
      summary: Get pending friend requests
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of pending requests
        "401":
          $ref: "#/components/responses/Unauthorized"

  /friends/search:
    get:
      tags: [Friends]
      operationId: searchUsers
      summary: Search for users
      security:
        - bearerAuth: []
      parameters:
        - name: query
          in: query
          required: true
          description: Search query (username or name)
          schema:
            type: string
      responses:
        "200":
          description: Search results
        "401":
          $ref: "#/components/responses/Unauthorized"

  /friends/suggestions:
    get:
      tags: [Friends]
      operationId: suggestFriends
      summary: Get suggested friends
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Suggested friends list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserSuggestion"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # --- GAMES ROUTES ---
  /games/free:
    get:
      tags: [Games]
      operationId: getFreeGames
      summary: Get free games
      security: [] # Public operation
      responses:
        "200":
          description: List of free games
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FreeGame"
        "404":
          $ref: "#/components/responses/NotFound"

  /games/discounted:
    get:
      tags: [Games]
      operationId: getDiscountedGames
      summary: Get discounted games
      security: [] # Public operation
      responses:
        "200":
          description: List of discounted games
        "404":
          $ref: "#/components/responses/NotFound"

  /games/global:
    get:
      tags: [Games]
      operationId: getGlobalGames
      summary: Get global games
      security: [] # Public operation
      responses:
        "200":
          description: List of global games
        "404":
          $ref: "#/components/responses/NotFound"

  /games/fetch/free:
    post:
      tags: [Admin]
      operationId: manualFetchFreeGames
      summary: Manually fetch free games from API (Admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Fetch successful
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /games/fetch/discounted:
    post:
      tags: [Admin]
      operationId: manualFetchDiscountedGames
      summary: Manually fetch discounted games (Admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Fetch successful
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /games/fetch/global:
    post:
      tags: [Admin]
      operationId: manualFetchGlobalGames
      summary: Manually fetch global games (Admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Fetch successful
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # --- CHAT ROUTES ---
  /chat/send:
    post:
      tags: [Chat]
      operationId: sendMessage
      summary: Send a secure message
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "200":
          description: Message sent
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: Bad Request - Invalid input or missing parameters
    Unauthorized:
      description: Unauthorized - Authentication required
    Forbidden:
      description: Forbidden - Insufficient permissions
    NotFound:
      description: Not Found - Requested resource does not exist

  schemas:
    # --- BASE SCHEMAS ---
    User:
      type: object
      properties:
        _id: { type: string, example: "60d5ecb54f162540d4a12345" }
        userName: { type: string, example: "johndoe" }
        email: { type: string, example: "john@example.com" }
        firstName: { type: string, example: "John" }
        lastName: { type: string, example: "Doe" }
        userImage: { type: array, items: { type: string } }
        role:
          type: array
          items:
            type: string
            enum: [owner, admin, user, writer]
        points: { type: number, default: 0 }
        gender: { type: string, enum: [male, female, other] }
        isVerified:
          {
            type: boolean,
            default: false,
            description: "Whether the user's email is verified",
          }
        userProfile: { $ref: "#/components/schemas/UserProfile" }
        socialLinks: { $ref: "#/components/schemas/SocialLinks" }
        playNow: { type: array, items: { type: string } }

    UserProfile:
      type: object
      properties:
        bio: { type: string, example: "Gamer at heart." }
        primaryColor: { type: string, example: "#FF5733" }
        bgProfile: { type: array, items: { type: string } }

    SocialLinks:
      type: object
      properties:
        instagram: { type: string }
        discord: { type: string }
        twitter: { type: string }
        facebook: { type: string }
        youtube: { type: string }

    # --- REQUESTS ---
    RegisterRequest:
      type: object
      required: [userName, email, password]
      properties:
        userName: { type: string, example: "newuser" }
        email: { type: string, format: email, example: "new@example.com" }
        password: { type: string, format: password, example: "securePass123" }
        firstName: { type: string }
        lastName: { type: string }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }

    UpdateUserRequest:
      type: object
      properties:
        firstName: { type: string }
        lastName: { type: string }
        bio: { type: string }
        userImage: { type: string, format: binary }
        bgProfile: { type: string, format: binary }

    SendMessageRequest:
      type: object
      required: [recipientId, content]
      properties:
        recipientId:
          { type: string, description: "MongoDB User ID of recipient" }
        content: { type: string, description: "Message text or attachment URL" }
        type: { type: string, enum: [text, image], default: text }

    # --- RESPONSES ---
    AuthResponse:
      type: object
      properties:
        success: { type: boolean }
        token: { type: string }
        user: { $ref: "#/components/schemas/User" }

    ActionSuccess:
      type: object
      properties:
        success: { type: boolean, example: true }
        message: { type: string, example: "Action completed successfully" }

    UserSuggestion:
      allOf:
        - $ref: "#/components/schemas/User"

    # --- GAME SCHEMAS ---
    FreeGame:
      type: object
      properties:
        id: { type: number }
        title: { type: string }
        worth: { type: string }
        thumbnail: { type: string }
        image: { type: string }
        description: { type: string }
        instructions: { type: string }
        open_giveaway_url: { type: string }
        platforms: { type: string }
        store: { type: string }
        status: { type: string }
